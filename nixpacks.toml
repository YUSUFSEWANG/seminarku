[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs",
    "mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache/data storage/logs",
    "chmod -R 777 storage bootstrap/cache"
]

[start]
cmd = """php -r \"
\$lines = [
  'APP_NAME=SeminarKu',
  'APP_ENV='.(getenv('APP_ENV')?:'production'),
  'APP_KEY='.(getenv('APP_KEY')?:''),
  'APP_DEBUG='.(getenv('APP_DEBUG')?:'false'),
  'APP_URL=https://'.(getenv('RAILWAY_PUBLIC_DOMAIN')?:'localhost'),
  'DB_CONNECTION=mysql',
  'DB_HOST='.(getenv('MYSQLHOST')?:'127.0.0.1'),
  'DB_PORT='.(getenv('MYSQLPORT')?:'3306'),
  'DB_DATABASE='.(getenv('MYSQLDATABASE')?:'railway'),
  'DB_USERNAME='.(getenv('MYSQLUSER')?:'root'),
  'DB_PASSWORD='.(getenv('MYSQL_ROOT_PASSWORD')?:''),
  'SESSION_DRIVER=file',
  'CACHE_DRIVER=file',
  'LOG_CHANNEL=stderr',
  'LOG_LEVEL=error',
];
file_put_contents('.env', implode(PHP_EOL, \$lines));
echo 'Generated .env OK'.PHP_EOL;
\" && php artisan migrate --force && php artisan db:seed --class=AdminSeeder --force 2>/dev/null; php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"""
