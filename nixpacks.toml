[phases.setup]
nixPkgs = ["php81", "php81Extensions.pdo_mysql", "php81Extensions.mbstring", "php81Extensions.bcmath", "php81Extensions.gd", "php81Extensions.zip", "php81Extensions.exif", "php81Extensions.pcntl", "composer", "nodejs_18", "nodePackages.npm"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs",
    "npm ci",
    "npm run build",
    "rm -rf node_modules"
]

[phases.deploy]
cmds = [
    "cp .env.example .env",
    "php artisan migrate --force",
    "php artisan db:seed --class=AdminSeeder --force 2>/dev/null || true",
    "php artisan config:clear",
    "php artisan view:clear"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
