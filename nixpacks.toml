[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs",
    "chmod -R 777 storage bootstrap/cache"
]

[start]
cmd = "mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache/data storage/logs && chmod -R 777 storage bootstrap/cache && cp .env.example .env && php artisan serve --host=0.0.0.0 --port=$PORT"
